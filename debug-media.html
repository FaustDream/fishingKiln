<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>debug</title></head>
<body>
<iframe id="frame" src="/index.html" style="width:390px;height:844px;border:0;"></iframe>
<pre id="out"></pre>
<script>
const frame = document.getElementById('frame');
frame.addEventListener('load', () => {
  setTimeout(() => {
    const doc = frame.contentDocument;
    const win = frame.contentWindow;
    const hero = doc.querySelector('.hero-section');
    const stats = doc.querySelector('.stat-grid');
    const buttons = doc.querySelector('.hero-actions');
    const scroll = doc.querySelector('.scroll-carousel');
    const out = {
      innerWidth: win.innerWidth,
      bodyScrollWidth: doc.body.scrollWidth,
      docClientWidth: doc.documentElement.clientWidth,
      heroCols: win.getComputedStyle(hero).gridTemplateColumns,
      statsCols: win.getComputedStyle(stats).gridTemplateColumns,
      buttonWidth: win.getComputedStyle(buttons).width,
      scrollWidth: win.getComputedStyle(scroll).width,
      heroWidth: win.getComputedStyle(hero).width
    };
    document.getElementById('out').textContent = JSON.stringify(out, null, 2);
  }, 1200);
});
</script>
</body>
</html>
